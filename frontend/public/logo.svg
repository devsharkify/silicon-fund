<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Silicon Fund">
  <title>Silicon Fund</title>
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect width="200" height="200" rx="36" fill="url(#bgGrad)"/>
  <!-- Circuit pin lines top -->
  <line x1="68" y1="28" x2="68" y2="52" stroke="white" stroke-width="6" stroke-opacity="0.35" stroke-linecap="round"/>
  <line x1="100" y1="22" x2="100" y2="52" stroke="white" stroke-width="6" stroke-opacity="0.35" stroke-linecap="round"/>
  <line x1="132" y1="28" x2="132" y2="52" stroke="white" stroke-width="6" stroke-opacity="0.35" stroke-linecap="round"/>
  <!-- Circuit pin lines bottom -->
  <line x1="68" y1="148" x2="68" y2="172" stroke="white" stroke-width="6" stroke-opacity="0.35" stroke-linecap="round"/>
  <line x1="100" y1="148" x2="100" y2="178" stroke="white" stroke-width="6" stroke-opacity="0.35" stroke-linecap="round"/>
  <line x1="132" y1="148" x2="132" y2="172" stroke="white" stroke-width="6" stroke-opacity="0.35" stroke-linecap="round"/>
  <!-- Circuit pin lines left -->
  <line x1="22" y1="80" x2="52" y2="80" stroke="white" stroke-width="6" stroke-opacity="0.35" stroke-linecap="round"/>
  <line x1="22" y1="120" x2="52" y2="120" stroke="white" stroke-width="6" stroke-opacity="0.35" stroke-linecap="round"/>
  <!-- Circuit pin lines right -->
  <line x1="148" y1="80" x2="178" y2="80" stroke="white" stroke-width="6" stroke-opacity="0.35" stroke-linecap="round"/>
  <line x1="148" y1="120" x2="178" y2="120" stroke="white" stroke-width="6" stroke-opacity="0.35" stroke-linecap="round"/>
  <!-- Chip body -->
  <rect x="52" y="52" width="96" height="96" rx="14" fill="white" fill-opacity="0.15" stroke="white" stroke-width="2" stroke-opacity="0.4"/>
  <!-- SF letters -->
  <text x="100" y="120" font-family="system-ui,-apple-system,Arial,sans-serif" font-size="50" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-3">SF</text>
  <!-- Corner dots -->
  <circle cx="68" cy="52" r="5" fill="white" fill-opacity="0.5"/>
  <circle cx="132" cy="52" r="5" fill="white" fill-opacity="0.5"/>
  <circle cx="68" cy="148" r="5" fill="white" fill-opacity="0.5"/>
  <circle cx="132" cy="148" r="5" fill="white" fill-opacity="0.5"/>
  <!-- Cyan accent bar at bottom of chip -->
  <rect x="68" y="138" width="64" height="5" rx="2.5" fill="#06B6D4" fill-opacity="0.85"/>
</svg>
